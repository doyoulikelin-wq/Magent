services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metabodash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
      - /tmp/metabodash_uploads:/tmp/metabodash_uploads
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
      - /tmp/metabodash_uploads:/tmp/metabodash_uploads
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  db_data:
  minio_data:
